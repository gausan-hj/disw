# ============================================
#  📋 学长团 · 联课活动自动提醒系统
# ============================================
#  版本: 2.3.0
#  功能: 周二/周四联课提醒 + 假期自动通知
#  假期: 3月18日 - 3月29日 (共12天)
#  开学: 3月30日
# ============================================

name: 🔔 学长团自动提醒 · 联课活动 + 假期通知

on:
  # ==========================================
  #  ⏰ 定时任务配置
  # ==========================================
  schedule:
    # ----- 周二联课提醒 (每周一) -----
    - cron: '0 11 * * 1'   # 🌆 周一 19:00 - 提醒明天周二
    - cron: '15 12 * * 1'  # 🔔 周一 20:15 - 再次提醒
    - cron: '0 14 * * 1'   # 🌙 周一 22:00 - 睡前提醒
    - cron: '0 22 * * 1'   # 🌅 周二 06:00 - 当天提醒
    
    # ----- 周四联课提醒 (每周三) -----
    - cron: '0 11 * * 3'   # 🌆 周三 19:00 - 提醒明天周四
    - cron: '15 12 * * 3'  # 🔔 周三 20:15 - 再次提醒
    - cron: '0 14 * * 3'   # 🌙 周三 22:00 - 睡前提醒
    - cron: '0 22 * * 3'   # 🌅 周四 06:00 - 当天提醒

  # ==========================================
  #  🎮 手动触发模式
  # ==========================================
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 测试模式 · 发送测试通知'
        required: false
        default: false
        type: boolean
      custom_message:
        description: '📝 自定义消息 · 留空则自动生成'
        required: false
        type: string

# ============================================
#  🚦 并发控制
# ============================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================
#  🎯 工作任务
# ============================================
jobs:
  send-reminder:
    name: 📨 发送通知
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # ===== 步骤 1: 获取当前日期 =====
      - name: 🕐 获取当前日期
        id: date
        run: |
          # 获取当前日期 (UTC)
          CURRENT_DATE=$(date +%Y-%m-%d)
          CURRENT_DAY=$(date +%d)
          CURRENT_MONTH=$(date +%m)
          CURRENT_YEAR=$(date +%Y)
          
          # 获取星期几
          WEEKDAY_NUM=$(date +%u)
          case $WEEKDAY_NUM in
            1) WEEKDAY_CN="星期一" ;;
            2) WEEKDAY_CN="星期二" ;;
            3) WEEKDAY_CN="星期三" ;;
            4) WEEKDAY_CN="星期四" ;;
            5) WEEKDAY_CN="星期五" ;;
            6) WEEKDAY_CN="星期六" ;;
            7) WEEKDAY_CN="星期日" ;;
          esac
          
          # 明天星期几
          TOMORROW_NUM=$(date -d "tomorrow" +%u 2>/dev/null || echo "0")
          case $TOMORROW_NUM in
            1) TOMORROW_CN="星期一" ;;
            2) TOMORROW_CN="星期二" ;;
            3) TOMORROW_CN="星期三" ;;
            4) TOMORROW_CN="星期四" ;;
            5) TOMORROW_CN="星期五" ;;
            6) TOMORROW_CN="星期六" ;;
            7) TOMORROW_CN="星期日" ;;
            *) TOMORROW_CN="未知" ;;
          esac
          
          # ===== 硬编码假期判断 =====
          # 假期: 2026年3月18日 - 2026年3月29日
          IS_HOLIDAY="false"
          IS_LAST_DAY="false"
          IS_FIRST_DAY="false"
          
          # 检查年份和月份
          if [ "$CURRENT_YEAR" = "2026" ] && [ "$CURRENT_MONTH" = "03" ]; then
            # 3月18日 - 3月29日
            if [ "$CURRENT_DAY" -ge 18 ] && [ "$CURRENT_DAY" -le 29 ]; then
              IS_HOLIDAY="true"
              
              # 第一天 (3月18日)
              if [ "$CURRENT_DAY" -eq 18 ]; then
                IS_FIRST_DAY="true"
              fi
              
              # 最后一天 (3月29日)
              if [ "$CURRENT_DAY" -eq 29 ]; then
                IS_LAST_DAY="true"
              fi
            fi
          fi
          
          # 明天是否开学 (今天是3月29日)
          TOMORROW_SCHOOL="false"
          if [ "$CURRENT_YEAR" = "2026" ] && [ "$CURRENT_MONTH" = "03" ] && [ "$CURRENT_DAY" -eq 29 ]; then
            TOMORROW_SCHOOL="true"
          fi
          
          # 今天是否开学 (今天是3月30日)
          TODAY_SCHOOL="false"
          if [ "$CURRENT_YEAR" = "2026" ] && [ "$CURRENT_MONTH" = "03" ] && [ "$CURRENT_DAY" -eq 30 ]; then
            TODAY_SCHOOL="true"
          fi
          
          # 计算放假第几天
          HOLIDAY_DAY=0
          if [ "$IS_HOLIDAY" = "true" ]; then
            HOLIDAY_DAY=$((CURRENT_DAY - 18 + 1))
          fi
          
          # 输出所有变量
          {
            echo "current_date=$CURRENT_DATE"
            echo "current_day=$CURRENT_DAY"
            echo "current_month=$CURRENT_MONTH"
            echo "current_year=$CURRENT_YEAR"
            echo "weekday_cn=$WEEKDAY_CN"
            echo "tomorrow_cn=$TOMORROW_CN"
            echo "is_holiday=$IS_HOLIDAY"
            echo "is_first_day=$IS_FIRST_DAY"
            echo "is_last_day=$IS_LAST_DAY"
            echo "holiday_day=$HOLIDAY_DAY"
            echo "tomorrow_school=$TOMORROW_SCHOOL"
            echo "today_school=$TODAY_SCHOOL"
            echo "is_manual=${{ github.event_name == 'workflow_dispatch' }}"
            echo "test_mode=${{ github.event.inputs.test_mode == 'true' }}"
          } >> $GITHUB_OUTPUT

      # ===== 步骤 2: 生成消息内容 =====
      - name: 💬 生成提醒内容
        id: message
        run: |
          # 获取所有变量
          CURRENT_DAY="${{ steps.date.outputs.current_day }}"
          CURRENT_MONTH="${{ steps.date.outputs.current_month }}"
          CURRENT_YEAR="${{ steps.date.outputs.current_year }}"
          WEEKDAY_CN="${{ steps.date.outputs.weekday_cn }}"
          TOMORROW_CN="${{ steps.date.outputs.tomorrow_cn }}"
          IS_HOLIDAY="${{ steps.date.outputs.is_holiday }}"
          IS_FIRST_DAY="${{ steps.date.outputs.is_first_day }}"
          IS_LAST_DAY="${{ steps.date.outputs.is_last_day }}"
          HOLIDAY_DAY="${{ steps.date.outputs.holiday_day }}"
          TOMORROW_SCHOOL="${{ steps.date.outputs.tomorrow_school }}"
          TODAY_SCHOOL="${{ steps.date.outputs.today_school }}"
          IS_MANUAL="${{ steps.date.outputs.is_manual }}"
          TEST_MODE="${{ steps.date.outputs.test_mode }}"
          CUSTOM_MESSAGE="${{ github.event.inputs.custom_message }}"
          
          # 初始化消息变量
          MESSAGE=""
          TITLE=""
          EMOJI=""
          
          # 调试输出
          echo "🔍 调试信息:"
          echo "  日期: $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY"
          echo "  星期: $WEEKDAY_CN"
          echo "  放假: $IS_HOLIDAY"
          echo "  放假第: $HOLIDAY_DAY 天"
          echo "  最后一天: $IS_LAST_DAY"
          
          # ===== 1. 自定义消息模式 =====
          if [ "$IS_MANUAL" = "true" ] && [ -n "$CUSTOM_MESSAGE" ]; then
            TITLE="📝 自定义提醒"
            MESSAGE="$CUSTOM_MESSAGE"
            EMOJI="💬"
          
          # ===== 2. 测试模式 =====
          elif [ "$TEST_MODE" = "true" ]; then
            TITLE="🧪 测试通知"
            if [ "$IS_HOLIDAY" = "true" ]; then
              MESSAGE="✅ 系统运行正常 · 今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY，放假第 $HOLIDAY_DAY 天"
            else
              MESSAGE="✅ 系统运行正常 · 今天是 $WEEKDAY_CN"
            fi
            EMOJI="🔧"
          
          # ===== 3. 手动触发（无自定义消息）=====
          elif [ "$IS_MANUAL" = "true" ]; then
            # 优先判断放假状态
            if [ "$IS_HOLIDAY" = "true" ]; then
              if [ "$IS_FIRST_DAY" = "true" ]; then
                TITLE="🏖️ 假期开始啦！"
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，假期开始啦！好好放松吧~"
                EMOJI="🎉"
              elif [ "$IS_LAST_DAY" = "true" ]; then
                TITLE="🏖️ 假期最后一天"
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，假期最后一天啦！明天就要开学了"
                EMOJI="🎒"
              else
                TITLE="🏖️ 放假通知"
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，放假第 $HOLIDAY_DAY 天，好好休息！"
                EMOJI="😎"
              fi
            elif [ "$TODAY_SCHOOL" = "true" ]; then
              TITLE="🏫 开学啦！"
              MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY，开学啦！祝新学期学习进步"
              EMOJI="⭐"
            elif [ "$TOMORROW_SCHOOL" = "true" ]; then
              TITLE="📢 明天开学啦！"
              MESSAGE="明天 $TOMORROW_CN 就要开学啦！请准备好书包、文具和校服"
              EMOJI="🏃"
            else
              # 非假期，检查联课活动
              WEEKDAY_NUM=$(date +%u)
              TOMORROW_NUM=$(date -d "tomorrow" +%u 2>/dev/null || echo "0")
              
              if [ "$WEEKDAY_NUM" = "2" ]; then
                TITLE="📢 今天有联课活动"
                MESSAGE="🎽 今天是星期二！有联课活动，请穿体育衣"
                EMOJI="⚽"
              elif [ "$WEEKDAY_NUM" = "4" ]; then
                TITLE="📢 今天有联课活动"
                MESSAGE="👔 今天是星期四！有联课活动，请穿校服"
                EMOJI="📚"
              elif [ "$TOMORROW_NUM" = "2" ]; then
                TITLE="⏰ 明天联课提醒"
                MESSAGE="🎽 明天星期二有联课活动，请准备体育衣"
                EMOJI="🌅"
              elif [ "$TOMORROW_NUM" = "4" ]; then
                TITLE="⏰ 明天联课提醒"
                MESSAGE="👔 明天星期四有联课活动，请准备校服"
                EMOJI="🌅"
              else
                TITLE="ℹ️ 系统提示"
                MESSAGE="今天和明天都没有联课活动"
                EMOJI="📌"
              fi
            fi
          
          # ===== 4. 自动触发（定时任务）=====
          else
            # 放假期间
            if [ "$IS_HOLIDAY" = "true" ]; then
              TITLE="🏖️ 放假通知"
              if [ "$IS_FIRST_DAY" = "true" ]; then
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，假期开始啦！好好放松吧~"
              elif [ "$IS_LAST_DAY" = "true" ]; then
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，假期最后一天啦！明天开学"
              else
                MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY $WEEKDAY_CN，放假第 $HOLIDAY_DAY 天，不用上学"
              fi
              EMOJI="😴"
            
            # 开学当天
            elif [ "$TODAY_SCHOOL" = "true" ]; then
              TITLE="🏫 开学啦！"
              MESSAGE="今天是 $CURRENT_YEAR-$CURRENT_MONTH-$CURRENT_DAY，开学啦！祝新学期学习进步"
              EMOJI="⭐"
            
            # 明天开学
            elif [ "$TOMORROW_SCHOOL" = "true" ]; then
              TITLE="📢 明天开学啦！"
              MESSAGE="明天 $TOMORROW_CN 就要开学啦！请准备好书包、文具和校服"
              EMOJI="🏃"
            
            # 联课提醒
            else
              WEEKDAY_NUM=$(date +%u)
              TOMORROW_NUM=$(date -d "tomorrow" +%u 2>/dev/null || echo "0")
              
              if [ "$WEEKDAY_NUM" = "2" ] || [ "$WEEKDAY_NUM" = "4" ]; then
                UNIFORM=$([ "$WEEKDAY_NUM" = "2" ] && echo "体育衣" || echo "校服")
                TITLE="📢 今天有联课活动"
                MESSAGE="$([ "$WEEKDAY_NUM" = "2" ] && echo "🎽" || echo "👔") 今天是 $WEEKDAY_CN！有联课活动，请穿 $UNIFORM"
                EMOJI="$([ "$WEEKDAY_NUM" = "2" ] && echo "⚽" || echo "📚")"
              elif [ "$TOMORROW_NUM" = "2" ] || [ "$TOMORROW_NUM" = "4" ]; then
                UNIFORM=$([ "$TOMORROW_NUM" = "2" ] && echo "体育衣" || echo "校服")
                TITLE="⏰ 明天联课提醒"
                MESSAGE="$([ "$TOMORROW_NUM" = "2" ] && echo "🎽" || echo "👔") 明天 $TOMORROW_CN 有联课活动，请准备 $UNIFORM"
                EMOJI="🌅"
              fi
            fi
          fi
          
          # 输出消息
          if [ -n "$MESSAGE" ]; then
            {
              echo "message=$MESSAGE"
              echo "title=$TITLE"
              echo "emoji=$EMOJI"
              echo "skip=false"
            } >> $GITHUB_OUTPUT
            echo "✅ 生成消息: $TITLE"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ 没有需要发送的消息"
          fi

      # ===== 步骤 3: 发送推送 =====
      - name: 📤 发送 OneSignal 推送
        if: steps.message.outputs.skip == 'false'
        run: |
          echo "🚀 正在发送通知..."
          echo "├─ 标题: ${{ steps.message.outputs.emoji }} ${{ steps.message.outputs.title }}"
          echo "├─ 内容: ${{ steps.message.outputs.message }}"
          
          curl -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Basic ${{ secrets.ONESIGNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "${{ secrets.ONESIGNAL_APP_ID }}",
              "headings": {"en": "${{ steps.message.outputs.emoji }} ${{ steps.message.outputs.title }}"},
              "contents": {"en": "${{ steps.message.outputs.message }}"},
              "included_segments": ["All"],
              "chrome_web_icon": "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
            }'
          
          echo "✅ 发送完成！"

      # ===== 步骤 4: 记录日志 =====
      - name: 📝 日志记录
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║         📋 执行报告                  ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "🕐 执行时间: $(date)"
          echo "📅 日期: ${{ steps.date.outputs.current_date }}"
          echo "📆 星期: ${{ steps.date.outputs.weekday_cn }}"
          echo "🏖️ 放假: ${{ steps.date.outputs.is_holiday }}"
          echo "📆 放假第: ${{ steps.date.outputs.holiday_day }} 天"
          echo "🎒 最后一天: ${{ steps.date.outputs.is_last_day }}"
          echo "🤖 手动触发: ${{ steps.date.outputs.is_manual }}"
          echo "🧪 测试模式: ${{ steps.date.outputs.test_mode }}"
          echo ""
          if [ "${{ steps.message.outputs.skip }}" == "false" ]; then
            echo "💬 发送内容:"
            echo "  ${{ steps.message.outputs.emoji }} ${{ steps.message.outputs.title }}"
            echo "  ${{ steps.message.outputs.message }}"
            echo "✅ 推送已发送"
          else
            echo "💤 没有需要发送的消息"
          fi
